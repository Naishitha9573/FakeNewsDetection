<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fake News Detector</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="particles">
